name: Render Graphviz Diagram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Render DOT to SVG
        run: |
          mkdir -p docs
          dot -Tsvg diagrams/flow.dot -o docs/ucube.svg

      - name: Commit rendered SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ucube.svg
          git commit -m "Auto-render ucube.svg" || echo "No changes to commit"
          git push
